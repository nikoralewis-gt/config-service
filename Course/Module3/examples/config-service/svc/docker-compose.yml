services:
  config-service:
    build: .
    container_name: config-service
    labels:
      - "service.name=config-service"
      - "service.type=api"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://config_user:config_pass@db:5432/config_db
      - DEBUG=true
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - config-service-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17.5
    container_name: svc-db-1
    labels:
      - "service.name=postgresql"
      - "service.type=database"
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-config_db}
      - POSTGRES_USER=${DATABASE_USER:-config_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-config_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-config_user} -d ${DATABASE_NAME:-config_db}"]
        interval: 10s
        timeout: 5s
        retries: 5
    networks:
      - config-service-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    labels:
      - "service.name=pgadmin"
      - "service.type=database-admin"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    networks:
      - config-service-network
    depends_on:
      db:
        condition: service_healthy

  # Observability Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    labels:
      - "service.name=prometheus"
      - "service.type=observability"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - config-service-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    labels:
      - "service.name=grafana"
      - "service.type=observability"
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - config-service-network
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    labels:
      - "service.name=otel-collector"
      - "service.type=observability"
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml
    command: ["--config=/etc/otelcol-contrib/otel-collector.yml"]
    networks:
      - config-service-network
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - '--housekeeping_interval=10s'
      - '--store_container_labels=false'
      - '--whitelisted_container_labels=com.docker.compose.service'
    networks:
      - config-service-network
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  config-service-network:
    driver: bridge
